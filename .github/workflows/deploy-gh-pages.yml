name: Deploy Page

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Typecheck
        run: pnpm typecheck

      - name: Engine Tests
        run: cd packages/engine && pnpm test

      - name: Build Page
        run: pnpm --filter ./packages/docs build

      - name: Check Page Links
        run: pnpm --filter ./packages/docs check:links

      - name: Upload GitHub Pages Artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./packages/docs/dist/client

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Bunny Pull Zone Cache
        if: github.ref == 'refs/heads/master'
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: pnpm purge:bunny
